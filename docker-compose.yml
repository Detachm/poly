# 多源并行录制：Polymarket / Binance / Chainlink / 0x8dxd Tracker / Discovery 循环
# 用法: docker compose up -d；targets.json 由 discovery_loop 写入 /app/data/targets.json（在 POLY_DATA_DIR 内），避免单文件 bind mount 导致 Errno 16
# 数据挂载 POLY_DATA_DIR（默认 /vault/core/data/poly）；checkpoint 默认 <data>/checkpoint

services:
  discovery_loop:
    network_mode: host
    build: .
    command: python -u ingest/discovery_loop.py --targets /app/data/targets.json --interval 60
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7897}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7897}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data", "--glob", "targets.health", "--max-age-sec", "1800"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  polymarket:
    network_mode: host
    build: .
    command: python -u ingest/recorder.py --targets /app/data/targets.json --output-dir /app/data/raw/polymarket
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7897}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7897}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data/raw/polymarket", "--glob", "**/*.jsonl", "--max-age-sec", "600"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  binance:
    network_mode: host
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7897}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7897}
    build: .
    command: python -u ingest/binance_recorder.py --output-dir /app/data/raw/binance
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data/raw/binance", "--glob", "**/*.jsonl", "--max-age-sec", "600"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  chainlink:
    network_mode: host
    build: .
    command: python -u ingest/chainlink_recorder.py --output-dir /app/data/raw/chainlink --poll-interval 1.0 --rpc ${POLYGON_RPC_URL:-https://polygon-mainnet.infura.io/v3/a42e1f8d9d97482f9f73239cc2b07325}
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    environment:
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-https://polygon-mainnet.infura.io/v3/a42e1f8d9d97482f9f73239cc2b07325}
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7897}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7897}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data/raw/chainlink", "--glob", "**/*.jsonl", "--max-age-sec", "1800"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  tracker_0x8dxd:
    network_mode: host
    build: .
    command: python -u ingest/tracker_0x8dxd.py
      --output-dir /app/data/raw/tracker_0x8dxd
      --interval 10
      --activity-interval 30
      --positions-interval 60
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7897}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7897}
      - TRACKER_USER_ADDRESS=${TRACKER_USER_ADDRESS:-0x63ce342161250d705dc0b16df89036c8e5f9ba9a}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data/raw/tracker_0x8dxd", "--glob", "heartbeat.jsonl", "--max-age-sec", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  chain_recorder_0x8dxd:
    network_mode: host
    build: .
    command: python -u ingest/chain_recorder_0x8dxd.py
      --output-dir /app/data/raw/chain_0x8dxd
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    environment:
      - TRACKER_USER_ADDRESS=${TRACKER_USER_ADDRESS:-0x63ce342161250d705dc0b16df89036c8e5f9ba9a}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py",
             "--dir", "/app/data/raw/chain_0x8dxd",
             "--glob", "heartbeat.jsonl",
             "--max-age-sec", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  audit:
    build: .
    command: >
      sh -c "while true; do
      python -u eda/retention/audit.py --data-dir /app/data --output /app/data/checkpoint/retention_filter.json || true;
      sleep 3600;
      done"
    volumes:
      - ./:/app
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    environment:
      - POLY_CHECKPOINT_DIR=${POLY_CHECKPOINT_DIR:-/app/data/checkpoint}
    restart: unless-stopped

  compact:
    build: .
    command: python -u ingest/compact_raw_to_bronze.py --data-dir /app/data --interval-sec 120
    environment:
      - POLY_CHECKPOINT_DIR=${POLY_CHECKPOINT_DIR:-/app/data/checkpoint}
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
      - ${POLY_CHECKPOINT_DIR:-/vault/core/data/poly/checkpoint}:/app/data/checkpoint
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data/lake/bronze", "--glob", "**/*.parquet", "--max-age-sec", "1800"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  silver:
    build: .
    command: >
      sh -c "while true; do
      python -u ingest/build_silver.py --data-dir /app/data --source polymarket || true;
      python -u ingest/build_silver.py --data-dir /app/data --source binance || true;
      python -u ingest/build_silver.py --data-dir /app/data --source chainlink || true;
      python -u ingest/build_silver.py --data-dir /app/data --source tracker_0x8dxd || true;
      python -u ingest/build_silver.py --data-dir /app/data --source chain_0x8dxd || true;
      sleep 300;
      done"
    environment:
      - POLY_CHECKPOINT_DIR=${POLY_CHECKPOINT_DIR:-/app/data/checkpoint}
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
      - ${POLY_CHECKPOINT_DIR:-/vault/core/data/poly/checkpoint}:/app/data/checkpoint
    restart: unless-stopped

  metrics:
    build: .
    command: >
      sh -c "while true; do
      python -u ingest/metrics_collector.py --data-dir /app/data --targets /app/data/targets.json --output /app/data/checkpoint/metrics.json || true;
      python -u ingest/alert_check.py --metrics /app/data/checkpoint/metrics.json || true;
      sleep 60;
      done"
    environment:
      - POLY_CHECKPOINT_DIR=${POLY_CHECKPOINT_DIR:-/app/data/checkpoint}
    volumes:
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
      - ${POLY_CHECKPOINT_DIR:-/vault/core/data/poly/checkpoint}:/app/data/checkpoint
    restart: unless-stopped

  etl:
    build: .
    command: python -u eda/01_etl/scripts/select_top2_markets.py --data-dir /app/data --hours 24 --min-buys ${ETL_MIN_BUYS:-10} --output /app/eda/01_etl/output/top2.json --run-etl
    profiles: ["manual"]
    environment:
      - POLY_CHECKPOINT_DIR=${POLY_CHECKPOINT_DIR:-/app/data/checkpoint}
    volumes:
      - ./:/app
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
      - ${POLY_CHECKPOINT_DIR:-/vault/core/data/poly/checkpoint}:/app/data/checkpoint
    restart: "no"
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data/lake/mart", "--glob", "**/*.parquet", "--max-age-sec", "3600"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  visual:
    build: .
    command: >
      sh -c "while true; do
      python -u eda/02_visual/scripts/batch_plot_retry.py --top2 /app/eda/01_etl/output/top2.json || true;
      sleep 300;
      done"
    volumes:
      - ./:/app
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/eda/02_visual/output", "--glob", "*.png", "--max-age-sec", "7200"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  paper_trader:
    network_mode: host
    build: .
    command: python -u -m simulate.run_paper --config /app/data/simulate/config.json
    volumes:
      - ./:/app
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7897}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7897}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "ingest/healthcheck.py", "--dir", "/app/data/simulate", "--glob", "heartbeat.json", "--max-age-sec", "300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 数据保留：在容器内执行，避免宿主机无 sudo 时无法删容器创建的 silver。先跑 audit 生成 audit_result.json，再 run 此服务。
  retention:
    build: .
    command: python eda/retention/apply_retention.py --audit eda/retention/audit_result.json --data-dir /app/data --silver-only
    volumes:
      - ./:/app
      - ${POLY_DATA_DIR:-/vault/core/data/poly}:/app/data
    environment:
      - POLY_DATA_DIR=/app/data
    profiles:
      - manual
    restart: "no"
